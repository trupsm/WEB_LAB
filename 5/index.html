<!DOCTYPE html>
<html>
<head>
<title>CSS Demo</title>
<style>
body{
    background-image:url("bg.jpg");
    background-repeat:no-repeat; /* Controls image repetition */
}
/* Different font styles */
.p1{
    font-family:Arial;
    font-size:20px;
    font-weight:bold;
}
.p2{
    font-family:Times New Roman;
    font-style:italic;
}
/* Link styles */
a:link{
    color:blue;
}
a:visited{
    color:purple;
}
a:hover{
    color:red;
}
a:active{
    color:green;
}
/* Visibility property */
.hidden{
    visibility:hidden;
}
</style>
</head>
<body>
<h2>CSS Demonstration</h2>
<p class="p1">This is bold Arial text.</p>
<p class="p2">This is italic Times New Roman text.</p>
<a href="https://www.google.com">Click Here</a>
<p>This text is visible.</p>
<p class="hidden">This text is hidden.</p>
</body>
</html>
