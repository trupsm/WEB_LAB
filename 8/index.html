<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<title>Average Marks</title>
</head>
<body>
<h2>Student Marks Form</h2>
Register No:<input type="text" id="reg" /><br /><br />
Subject Code:<input type="text" id="sub" /><br /><br />
Test 1:<input type="text" id="t1" /><br /><br />
Test 2:<input type="text" id="t2" /><br /><br />
Test 3:<input type="text" id="t3" /><br /><br />
<button onclick="average()">Calculate Average</button>
<script>
function average()
{
    var reg = document.getElementById("reg").value;
    var sub = document.getElementById("sub").value;
    var t1 = parseInt(document.getElementById("t1").value);
    var t2 = parseInt(document.getElementById("t2").value);
    var t3 = parseInt(document.getElementById("t3").value);
    if(reg=="" || sub=="" || isNaN(t1) || isNaN(t2) || isNaN(t3))
    {
        alert("Fill all fields");
        return;
    }
    var min = Math.min(t1,t2,t3);
    var avg = (t1+t2+t3-min)/2;
    alert("Average of Best Two Tests = " + avg);
}
</script>
</body>
</html>
